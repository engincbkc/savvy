name: Savvy
options:
  bundleIdPrefix: com.savvy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top
  projectFormatVersion: "1"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    CODE_SIGN_STYLE: "Automatic"

packages:
  SavvyFoundation:
    path: Packages/Core/SavvyFoundation
  SavvyDesignSystem:
    path: Packages/Core/SavvyDesignSystem
  SavvyNetworking:
    path: Packages/Core/SavvyNetworking

targets:
  Savvy:
    type: application
    platform: iOS
    sources:
      - path: Savvy
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Savvy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.savvy.savvy
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - package: SavvyFoundation
      - package: SavvyDesignSystem
      - package: SavvyNetworking

  SavvyWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SavvyWidgets
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.savvy.savvy.widgets
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
